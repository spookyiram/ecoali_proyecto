<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Script oficial de Google -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div class="login-container">
        <img src="imagenes/logo.jpeg" alt="Logo ECOALI" class="logo">

        <p>Inicie sesión para continuar</p>

        <form>
            <div class="input-box">
                <i class="fa fa-user"></i>
                <input type="email" placeholder="Correo Electrónico" required>
            </div>

            <div class="input-box">
                <i class="fa fa-lock"></i>
                <input type="password" placeholder="Contraseña" required>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox"> Recordarme
                </label>
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>

            <p class="register-link">
                ¿No tienes cuenta? <a href="register.html">Regístrate</a>
            </p>

            <div class="divider">
                <span>o</span>
            </div>

            <!-- LOGIN CON GOOGLE -->
            <div id="g_id_onload"
                data-client_id="906898809451-v11m3ec2ifkf3ctif8evf1upunegjdt5.apps.googleusercontent.com"
                data-callback="handleCredentialResponse"
                data-auto_prompt="false">
            </div>

            <div class="g_id_signin"
                data-type="standard"
                data-size="large"
                data-theme="outline"
                data-text="signin_with"
                data-shape="pill"
                data-logo_alignment="left">
            </div>

        </form>
    </div>

<script>
function handleCredentialResponse(response) {
    const token = response.credential;
    console.log("Token de Google:", token);

}
</script>

</body>
</html>
